<!DOCTYPE html>
<html>
<head>
    <title>Report Issue - GHMC</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body{
            margin:0;
            background:#eef2f5;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* =========================
           LAYOUT
        ========================= */
        .wrapper{
            display:flex;
            height:100vh;
        }

        /* =========================
           SIDEBAR (same as dashboard)
        ========================= */
        .sidebar{
            width:240px;
            background:#0f2d4d;
            color:white;
            display:flex;
            flex-direction:column;
            padding-top:20px;
        }

        .sidebar h4{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            padding:14px 22px;
            display:flex;
            align-items:center;
            gap:12px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#173f6b;
        }

        /* active page highlight */
        .sidebar a.active{
            background:#14532d;
        }

        /* push logout bottom */
        .logout{
            margin-top:auto;
            margin-bottom:20px;
        }

        /* =========================
           CONTENT
        ========================= */
        .content{
            flex:1;
            padding:40px;
            overflow:auto;
        }

        .card{
            border-radius:16px;
            max-width:700px;
            margin:auto;
        }

        .header{
            font-size:22px;
            font-weight:bold;
            margin-bottom:20px;
            color:#0f2d4d;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- ================= SIDEBAR ================= -->
    <div class="sidebar">

        <h4>
            <i class="fa-solid fa-user"></i>
            Citizen Panel
        </h4>

        <a href="citizen-dashboard.html">
            <i class="fa-solid fa-list-check"></i>
            My Complaints
        </a>

        <a href="report-issue.html" class="active">
            <i class="fa-solid fa-triangle-exclamation"></i>
            Report Issue
        </a>

        <a href="track.html">
            <i class="fa-solid fa-magnifying-glass"></i>
            Track Complaint
        </a>

        <a href="login.html" class="logout">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </a>

    </div>


    <!-- ================= CONTENT ================= -->
    <div class="content">

        <div class="header">
            Report Issue ⚠️
        </div>

        <div class="container">

            <div class="card shadow p-4">

                <h4 class="text-center mb-4">Submit Complaint</h4>

                <form id="issueForm" method="POST" enctype="multipart/form-data">

                    <label class="fw-bold">Issue Type</label>
                    <select name="type" class="form-control mb-3" required>
                        <option value="">Select Department</option>
                        <option>Sanitation</option>
                        <option>Roads and Infrastructure</option>
                        <option>Water Supply</option>
                        <option>Health and Sanitation</option>
                        <option>Parks and Recreation</option>
                        <option>Street Lighting</option>
                        <option>Building Permissions</option>
                        <option>Waste Management</option>
                    </select>

                    <label class="fw-bold">Zone</label>
                    <select id="zone" name="zone" class="form-control mb-3" required></select>

                    <label class="fw-bold">Circle</label>
                    <select id="circle" name="circle" class="form-control mb-3" required></select>

                    <label class="fw-bold">Ward</label>
                    <select id="ward" name="ward" class="form-control mb-3" required></select>

                    <label class="fw-bold">Address</label>
                    <input name="address" class="form-control mb-3" required>

                    <label class="fw-bold">Photo</label>
                    <input type="file" name="photo" class="form-control mb-4" accept="image/*" required>

                    <button type="submit" class="btn btn-success w-100">
                        Submit Complaint
                    </button>

                    <p id="msg" class="text-center mt-3"></p>

                </form>

            </div>

        </div>

    </div>

</div>
<!-- LOAD ORDER VERY IMPORTANT -->
<script src="js/ghmc-data.js"></script>
<script src="js/report-issue.js"></script>

</body>
</html>
